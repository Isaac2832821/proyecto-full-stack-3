# ══════════════════════════════════════════════════════════════════
# secrets-template.yaml — Template de Kubernetes Secret
# Colegio Bernardo O'Higgins — Sistema de Gestión Escolar
#
# ⚠️  ESTE ARCHIVO ES SOLO UN TEMPLATE — NO CONTIENE VALORES REALES.
# Los secrets se crean automáticamente por el workflow CI/CD.
#
# Para crear manualmente (reemplaza <valor_base64> con valores reales):
#   kubectl apply -f eks/k8s-manifests/secrets-template.yaml -n colegio
#
# Para generar un valor base64:
#   echo -n "mi_secreto" | base64
# ══════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name: colegio-secrets
  namespace: colegio
  labels:
    project: colegio-ohiggins
type: Opaque
data:
  # JWT Secret — mismo valor que en AWS Secrets Manager
  # Generado con: echo -n "tu_jwt_secret_aqui" | base64
  jwt-secret: REPLACE_WITH_BASE64_JWT_SECRET

  # RabbitMQ — host, usuario y contraseña
  rabbitmq-host: REPLACE_WITH_BASE64_RABBITMQ_HOST
  rabbitmq-user: REPLACE_WITH_BASE64_RABBITMQ_USER
  rabbitmq-pass: REPLACE_WITH_BASE64_RABBITMQ_PASS
