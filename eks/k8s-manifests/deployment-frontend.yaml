# ══════════════════════════════════════════════════════════════════
# deployment-frontend.yaml — Frontend (React/Vite + Nginx)
# Colegio Bernardo O'Higgins — Sistema de Gestión Escolar
#
# Imagen: ECR → <ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/colegio/colegio-frontend
# Puerto: 8080 (nginx non-root)
# Réplicas: 2 (alta disponibilidad, expuesto vía LoadBalancer)
# ══════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: colegio
  labels:
    app: frontend
    project: colegio-ohiggins
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: frontend
        project: colegio-ohiggins
    spec:
      containers:
        - name: frontend
          # La imagen se actualiza automáticamente por el workflow de CI/CD
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/colegio/colegio-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: colegio
  labels:
    app: frontend
    project: colegio-ohiggins
  annotations:
    # AWS Network Load Balancer en puerto 80 → container 8080
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
