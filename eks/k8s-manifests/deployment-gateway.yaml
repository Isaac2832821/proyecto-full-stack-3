# ══════════════════════════════════════════════════════════════════
# deployment-gateway.yaml — API Gateway
# Colegio Bernardo O'Higgins — Sistema de Gestión Escolar
#
# Imagen: ECR → <ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/colegio/colegio-api-gateway
# Puerto: 8080
# Réplicas: 2 (alta disponibilidad, expuesto vía LoadBalancer)
# ══════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: colegio
  labels:
    app: api-gateway
    project: colegio-ohiggins
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api-gateway
        project: colegio-ohiggins
    spec:
      containers:
        - name: api-gateway
          # La imagen se actualiza automáticamente por el workflow de CI/CD
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/colegio/colegio-api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://eureka-server.colegio.svc.cluster.local:8761/eureka"
            - name: EUREKA_INSTANCE_PREFERIPADDRESS
              value: "true"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: colegio-secrets
                  key: jwt-secret
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1024Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: colegio
  labels:
    app: api-gateway
    project: colegio-ohiggins
  annotations:
    # AWS Network Load Balancer (más eficiente que ALB para este caso)
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
