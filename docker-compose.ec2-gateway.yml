# ══════════════════════════════════════════════════════════════════
# docker-compose.ec2-gateway.yml — EC2-Gateway (Eureka + API Gateway)
#
# Variables requeridas en /home/ec2-user/.env:
#   DOCKERHUB_USERNAME=tu_usuario
#   JWT_SECRET=tu_jwt_secret
#
# Uso en EC2-Gateway:
#   docker compose -f docker-compose.ec2-gateway.yml pull
#   docker compose -f docker-compose.ec2-gateway.yml up -d
# ══════════════════════════════════════════════════════════════════
version: "3.9"

services:

  # ── Eureka Server — Service Discovery ────────────────────────────
  eureka-server:
    image: ${DOCKERHUB_USERNAME}/colegio-eureka-server:latest
    container_name: eureka-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    networks:
      - gateway-net
    volumes:
      - eureka-logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8761/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── API Gateway — Puerta de entrada única ─────────────────────────
  api-gateway:
    image: ${DOCKERHUB_USERNAME}/colegio-api-gateway:latest
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Eureka está en el mismo host (localhost dentro de la red Docker)
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - gateway-net
    volumes:
      - gateway-logs:/app/logs

networks:
  gateway-net:
    driver: bridge

volumes:
  eureka-logs:
    name: colegio-eureka-logs
  gateway-logs:
    name: colegio-gateway-logs
