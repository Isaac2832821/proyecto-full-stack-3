spring:
  application:
    name: ms-reportes

# ── Servidor ─────────────────────────────────────────────────────────────
server:
  port: 8086

# ── JWT (misma clave compartida) ──────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:5A7234753778214125442A472D4B6150645367566B5970337336763979244226}

# ── Redis Cache ───────────────────────────────────────────────────────────
# Se usa Redis como caché de reportes estadísticos para evitar recalcular
# promedios y estadísticas en cada petición.
#
# TTL definidos por caché:
#   - reporte-estudiante: 15 minutos (datos individuales cambian frecuentemente)
#   - reporte-curso:      30 minutos (estadísticas de curso son más estables)
#   - ranking-curso:      60 minutos (ranking global, poco volátil)
spring.data.redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}
  password: ${REDIS_PASSWORD:}
  timeout: 3000ms

spring.cache:
  type: redis

# ── Eureka Client ─────────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# ── URLs de microservicios internos (para consultas directas) ─────────────
microservices:
  calificaciones: ${MS_CALIFICACIONES_URL:http://localhost:8082}
  asistencia: ${MS_ASISTENCIA_URL:http://localhost:8083}

# ── Swagger / OpenAPI ─────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# ── Logging ───────────────────────────────────────────────────────────────
logging:
  level:
    cl.colegio: DEBUG
    org.springframework.cache: DEBUG

# ── Actuator ──────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,caches
