spring:
  application:
    name: ms-calificaciones

# ── Servidor ─────────────────────────────────────────────────────────────
server:
  port: 8082

# ── JWT (misma clave que ms-autenticacion para validar tokens) ───────────
jwt:
  secret: ${JWT_SECRET:5A7234753778214125442A472D4B6150645367566B5970337336763979244226}

# ── RabbitMQ (producer de eventos de calificaciones) ─────────────────────
# Al registrar una nota, se publica un evento en el exchange colegio.exchange
# para que ms-notificaciones genere la notificación al estudiante.
spring.rabbitmq:
  host: ${RABBITMQ_HOST:localhost}
  port: ${RABBITMQ_PORT:5672}
  username: ${RABBITMQ_USER:guest}
  password: ${RABBITMQ_PASS:guest}

# ── Eureka Client ─────────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# ── Swagger / OpenAPI ─────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# ── Logging ───────────────────────────────────────────────────────────────
logging:
  level:
    cl.colegio: DEBUG
    org.springframework.amqp: INFO

# ── Actuator ──────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
