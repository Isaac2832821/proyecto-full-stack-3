# ══════════════════════════════════════════════════════════════════
# CI/CD Pipeline — Gateway (Eureka + API Gateway)
# Colegio Bernardo O'Higgins — Sistema de Gestión Escolar
#
# Trigger: push sobre la rama 'deploy' con cambios en gateway/eureka
# Flujo:   Build imágenes → Push Docker Hub → Deploy EC2-Gateway → Health Check
# ══════════════════════════════════════════════════════════════════
name: CI/CD — Gateway

on:
  push:
    branches:
      - deploy
    paths:
      - "eureka-server/**"
      - "api-gateway/**"
      - "docker-compose.ec2-gateway.yml"
      - ".github/workflows/deploy-gateway.yml"

env:
  DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Build y Push de imágenes Gateway (paralelo)
  # ─────────────────────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: eureka-server
            context: ./eureka-server
            image_suffix: colegio-eureka-server
          - service: api-gateway
            context: ./api-gateway
            image_suffix: colegio-api-gateway

    steps:
      - name: 📥 Checkout código fuente
        uses: actions/checkout@v4

      - name: 🔐 Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ Generar metadata de imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image_suffix }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: ⚡ Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔨 Build y Push — ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,scope=${{ matrix.service }},mode=max

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Deploy en EC2-Gateway
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy en EC2-Gateway
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: 🔑 Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            us-east-1

      - name: 🔍 Obtener Instance ID ec2-gateway
        id: get-instance
        run: |
          ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=ec2-gateway" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          PUBLIC_IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=ec2-gateway" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)
          echo "instance_id=$ID" >> $GITHUB_OUTPUT
          echo "public_ip=$PUBLIC_IP" >> $GITHUB_OUTPUT
          echo "✅ Gateway instance: $ID (Public IP: $PUBLIC_IP)"

      - name: 🖥️ Deploy via SSM en EC2-Gateway
        env:
          DH_USER:     ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN:    ${{ secrets.DOCKERHUB_TOKEN }}
          JWT:         ${{ secrets.JWT_SECRET }}
          REPO:        ${{ github.repository }}
          INSTANCE_ID: ${{ steps.get-instance.outputs.instance_id }}
        run: |
          python3 << 'PYEOF'
          import json, os
          dh_user  = os.environ['DH_USER']
          dh_token = os.environ['DH_TOKEN']
          jwt      = os.environ['JWT']
          repo     = os.environ['REPO']
          commands = [
            "export PATH=$PATH:/usr/libexec/docker/cli-plugins:/usr/lib/docker/cli-plugins",
            f"echo '{dh_token}' | docker login -u '{dh_user}' --password-stdin",
            f"curl -fsSL 'https://raw.githubusercontent.com/{repo}/deploy/docker-compose.ec2-gateway.yml' -o /home/ec2-user/docker-compose.ec2-gateway.yml",
            f"cd /home/ec2-user && DOCKERHUB_USERNAME='{dh_user}' JWT_SECRET='{jwt}' docker compose -f docker-compose.ec2-gateway.yml pull",
            f"cd /home/ec2-user && DOCKERHUB_USERNAME='{dh_user}' JWT_SECRET='{jwt}' docker compose -f docker-compose.ec2-gateway.yml up -d --remove-orphans",
            "sleep 20",
            "cd /home/ec2-user && docker compose -f docker-compose.ec2-gateway.yml ps",
            "docker image prune -f",
          ]
          with open("/tmp/ssm-gateway.json", "w") as f:
              json.dump({"commands": commands}, f)
          print("✅ JSON SSM generado OK")
          PYEOF

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters file:///tmp/ssm-gateway.json \
            --comment "Deploy gateway ${{ github.sha }}" \
            --region us-east-1 \
            --query "Command.CommandId" \
            --output text)
          echo "SSM Command ID: $COMMAND_ID"

          # Esperar resultado (máx 6 min)
          for i in $(seq 1 36); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --region us-east-1 \
              --query "StatusDetails" --output text 2>/dev/null || echo "Pending")
            echo "⏳ ($i/36): $STATUS"
            if [[ "$STATUS" == "Success" ]]; then
              aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --region us-east-1 --query "StandardOutputContent" --output text
              break
            elif [[ "$STATUS" == *"Failed"* || "$STATUS" == "Cancelled" || "$STATUS" == *"TimedOut"* ]]; then
              aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --region us-east-1 --query "StandardErrorContent" --output text
              exit 1
            fi
          done

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Health Check — Eureka + Gateway
  # ─────────────────────────────────────────────────────────────
  health-check:
    name: 🏥 Health Check — Gateway & Eureka
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: 🔑 Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            us-east-1

      - name: 🔍 Obtener IP pública de ec2-gateway
        id: get-ip
        run: |
          PUBLIC_IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=ec2-gateway" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)
          echo "public_ip=$PUBLIC_IP" >> $GITHUB_OUTPUT
          echo "EC2-Gateway Public IP: $PUBLIC_IP"

      - name: 🏥 Verificar Eureka Dashboard
        env:
          PUBLIC_IP: ${{ steps.get-ip.outputs.public_ip }}
        run: |
          echo "🔍 Verificando Eureka Server en $PUBLIC_IP:8761..."
          for attempt in 1 2 3 4; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "http://$PUBLIC_IP:8761/" || echo "000")
            if [[ "$HTTP_CODE" == "200" ]]; then
              echo "✅ Eureka Server UP (HTTP $HTTP_CODE)"
              break
            fi
            echo "⏳ Intento $attempt/4 — Eureka (HTTP $HTTP_CODE)"
            sleep 20
          done

      - name: 🏥 Verificar API Gateway Actuator
        env:
          GATEWAY_URL: ${{ secrets.VITE_API_URL }}
        run: |
          echo "🔍 Verificando API Gateway health..."
          for attempt in 1 2 3; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$GATEWAY_URL/actuator/health" || echo "000")
            if [[ "$HTTP_CODE" == "200" ]]; then
              echo "✅ API Gateway UP (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "⏳ Intento $attempt/3 — Gateway (HTTP $HTTP_CODE)"
            sleep 15
          done
          echo "⚠️  Gateway no respondió al health check (puede estar aún iniciando)"

# Trigger gateway
