# ══════════════════════════════════════════════════════════════════
# CI/CD Pipeline — Frontend
# Colegio Bernardo O'Higgins — Sistema de Gestión Escolar
#
# Trigger: push sobre la rama 'deploy' con cambios en frontend/
# Flujo:   Build imagen Docker → Push Docker Hub → Deploy EC2 → Smoke Test
# ══════════════════════════════════════════════════════════════════
name: CI/CD — Frontend

on:
  push:
    branches:
      - deploy
    paths:
      - "frontend/**"
      - "docker-compose.ec2-frontend.yml"
      - ".github/workflows/deploy-frontend.yml"

# Variables de entorno globales del workflow
env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/colegio-frontend

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Build y Push de imagen Docker a Docker Hub
  # ─────────────────────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push imagen Docker
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout código fuente
        uses: actions/checkout@v4

      - name: 🔐 Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Genera tags: latest + sha-<commit>
      - name: 🏷️ Generar metadata de imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      # Caché de capas de Docker entre builds (reduce tiempo de CI)
      - name: ⚡ Configurar caché de Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔨 Build y Push imagen multi-stage
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # VITE_API_URL se inyecta como build arg para que Vite la embeba en el JS
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          # Caché entre workflows del mismo repositorio
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Deploy automático en EC2 Frontend (subred pública)
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy en EC2 Frontend
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: 🔑 Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            us-east-1

      - name: 🔍 Obtener Instance ID ec2-frontend
        id: get-instance
        run: |
          ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=ec2-frontend" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          PUBLIC_IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=ec2-frontend" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)
          echo "instance_id=$ID" >> $GITHUB_OUTPUT
          echo "public_ip=$PUBLIC_IP" >> $GITHUB_OUTPUT
          echo "✅ Frontend instance: $ID (Public IP: $PUBLIC_IP)"

      - name: 🖥️ Deploy via SSM en EC2 Frontend
        env:
          DH_USER:     ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN:    ${{ secrets.DOCKERHUB_TOKEN }}
          INSTANCE_ID: ${{ steps.get-instance.outputs.instance_id }}
        run: |
          python3 << 'PYEOF'
          import json, os
          dh_user  = os.environ['DH_USER']
          dh_token = os.environ['DH_TOKEN']
          commands = [
            f"echo '{dh_token}' | docker login -u '{dh_user}' --password-stdin",
            # Pull nueva imagen antes de detener el contenedor (minimiza downtime)
            f"docker pull '{dh_user}/colegio-frontend:latest'",
            "docker stop frontend 2>/dev/null || true",
            "docker rm   frontend 2>/dev/null || true",
            f"docker run -d --name frontend --restart unless-stopped -p 80:8080 {dh_user}/colegio-frontend:latest",
            "docker ps | grep frontend",
            "docker image prune -f",
          ]
          with open("/tmp/ssm-frontend.json", "w") as f:
              json.dump({"commands": commands}, f)
          print("✅ JSON SSM generado OK")
          PYEOF

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters file:///tmp/ssm-frontend.json \
            --comment "Deploy frontend ${{ github.sha }}" \
            --region us-east-1 \
            --query "Command.CommandId" \
            --output text)
          echo "SSM Command ID: $COMMAND_ID"

          for i in $(seq 1 30); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --region us-east-1 \
              --query "StatusDetails" --output text 2>/dev/null || echo "Pending")
            echo "⏳ ($i/30): $STATUS"
            if [[ "$STATUS" == "Success" ]]; then
              aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --region us-east-1 --query "StandardOutputContent" --output text
              break
            elif [[ "$STATUS" == *"Failed"* || "$STATUS" == "Cancelled" || "$STATUS" == *"TimedOut"* ]]; then
              aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --region us-east-1 --query "StandardErrorContent" --output text
              exit 1
            fi
          done

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Smoke Test — Verificar que el Frontend responde HTTP 200
  # ─────────────────────────────────────────────────────────────
  smoke-test:
    name: 🔥 Smoke Test — Frontend
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: 🔑 Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            us-east-1

      - name: 🔍 Obtener IP pública de ec2-frontend
        id: get-ip
        run: |
          PUBLIC_IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=ec2-frontend" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)
          echo "public_ip=$PUBLIC_IP" >> $GITHUB_OUTPUT
          echo "Frontend IP: $PUBLIC_IP"

      - name: 🔥 Smoke Test — HTTP 200 en el Frontend
        env:
          PUBLIC_IP: ${{ steps.get-ip.outputs.public_ip }}
        run: |
          echo "🔥 Verificando que el frontend responde en http://$PUBLIC_IP"
          for attempt in 1 2 3 4; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "http://$PUBLIC_IP/" || echo "000")
            if [[ "$HTTP_CODE" == "200" ]]; then
              echo "✅ Frontend UP — HTTP $HTTP_CODE"
              echo "🌐 URL del sistema: http://$PUBLIC_IP"
              exit 0
            fi
            echo "⏳ Intento $attempt/4 — Frontend (HTTP $HTTP_CODE)"
            sleep 10
          done
          echo "❌ Frontend no respondió — verificar logs del contenedor en EC2"
          exit 1

      - name: 📋 Publicar URL en Job Summary
        if: success()
        env:
          PUBLIC_IP: ${{ steps.get-ip.outputs.public_ip }}
        run: |
          echo "## ✅ Deploy Frontend Exitoso" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**URL Frontend:** http://$PUBLIC_IP" >> $GITHUB_STEP_SUMMARY
          echo "**URL Gateway:** ${{ secrets.VITE_API_URL }}" >> $GITHUB_STEP_SUMMARY

# Trigger frontend
