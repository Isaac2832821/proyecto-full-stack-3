# ══════════════════════════════════════════════════════════════════
# CI/CD Pipeline — Frontend (ECS Fargate)
# Colegio Bernardo O'Higgins — Sistema de Gestión Escolar
#
# Trigger: push sobre la rama 'deploy' con cambios en frontend/
# Flujo:   Build imagen Docker → Push Docker Hub → Deploy Amazon ECS Fargate
# ══════════════════════════════════════════════════════════════════
name: CI/CD — Frontend

on:
  push:
    branches:
      - deploy
    paths:
      - "frontend/**"
      - "docker-compose.ec2-frontend.yml"
      - ".github/workflows/deploy-frontend.yml"

# Variables de entorno globales del workflow
env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/colegio-frontend

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Build y Push de imagen Docker a Docker Hub
  # ─────────────────────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push imagen Docker
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout código fuente
        uses: actions/checkout@v4

      - name: 🔐 Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🔑 Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            us-east-1

      # Obtiene la URL real del API Gateway en este orden:
      #   1. LoadBalancer de EKS (si el cluster existe)
      #   2. IP pública del EC2 etiquetado ec2-gateway (si existe)
      #   3. Fallback al secret VITE_API_URL
      - name: 🔍 Obtener URL dinámica del API Gateway
        id: api-url
        run: |
          python3 << 'PYEOF'
          import subprocess, json, os, sys

          def run(cmd):
              r = subprocess.run(cmd, shell=True, capture_output=True, text=True)
              return r.stdout.strip(), r.returncode

          api_url = ""

          # 1 — Intentar EKS
          out, code = run(
              "aws eks describe-cluster --name colegio-eks-cluster "
              "--region us-east-1 --query cluster.status --output text 2>/dev/null"
          )
          if code == 0 and out == "ACTIVE":
              run("aws eks update-kubeconfig --name colegio-eks-cluster --region us-east-1")
              dns, _ = run(
                  "kubectl get svc api-gateway -n colegio "
                  "-o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null"
              )
              if dns:
                  api_url = f"http://{dns}:8080"
                  print(f"✅ API Gateway en EKS: {api_url}")

          # 2 — Intentar EC2 ec2-gateway
          if not api_url:
              ip, code = run(
                  "aws ec2 describe-instances "
                  "--filters 'Name=tag:Name,Values=ec2-gateway' "
                  "          'Name=instance-state-name,Values=running' "
                  "--query 'Reservations[0].Instances[0].PublicIpAddress' "
                  "--output text --region us-east-1 2>/dev/null"
              )
              if code == 0 and ip and ip != "None":
                  api_url = f"http://{ip}:8080"
                  print(f"✅ API Gateway en EC2: {api_url}")

          # 3 — Fallback al secret
          if not api_url:
              api_url = os.environ.get("VITE_API_URL_SECRET", "")
              print(f"⚠️  Usando VITE_API_URL del secret: {api_url}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"api_url={api_url}\n")
          PYEOF
        env:
          VITE_API_URL_SECRET: ${{ secrets.VITE_API_URL }}

      # Genera tags: latest + sha-<commit>
      - name: 🏷️ Generar metadata de imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      # Caché de capas de Docker entre builds (reduce tiempo de CI)
      - name: ⚡ Configurar caché de Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔨 Build y Push imagen multi-stage
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # VITE_API_URL se resuelve dinámicamente (EKS → EC2 → secret fallback)
          build-args: |
            VITE_API_URL=${{ steps.api-url.outputs.api_url }}
            VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          # Caché entre workflows del mismo repositorio
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Deploy automático en Amazon ECS (Fargate)
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy en Amazon ECS Fargate
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: 🔑 Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            us-east-1

      - name: 📥 Descargar Task Definition actual
        run: |
          aws ecs describe-task-definition --task-definition colegio-frontend-task --query taskDefinition > task-definition.json

      - name: 📝 Configurar nueva imagen en Task Definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: frontend-container
          image: ${{ env.IMAGE_NAME }}:latest

      - name: 🚀 Desplegar a Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: frontend-service
          cluster: colegio-cluster
          wait-for-service-stability: true

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Smoke Test — Obtener URL del Load Balancer
  # ─────────────────────────────────────────────────────────────
  smoke-test:
    name: 🔥 Smoke Test — ALB Frontend
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: 🔑 Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            us-east-1

      - name: 🔍 Obtener DNS del Application Load Balancer
        id: get-alb
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers --names colegio-frontend-alb --query "LoadBalancers[0].DNSName" --output text)
          echo "alb_dns=$ALB_DNS" >> $GITHUB_OUTPUT
          echo "🌐 ALB DNS: http://$ALB_DNS"

      - name: 🔥 Smoke Test — HTTP 200 en el ALB
        env:
          ALB_DNS: ${{ steps.get-alb.outputs.alb_dns }}
        run: |
          echo "🔥 Verificando que el frontend responde en http://$ALB_DNS"
          for attempt in {1..6}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "http://$ALB_DNS/" || echo "000")
            if [[ "$HTTP_CODE" == "200" ]]; then
              echo "✅ Frontend ECS UP — HTTP $HTTP_CODE"
              echo "🌐 URL del sistema: http://$ALB_DNS"
              exit 0
            fi
            echo "⏳ Intento $attempt/6 — ALB (HTTP $HTTP_CODE)"
            sleep 15
          done
          echo "❌ Frontend no respondió en el ALB"
          exit 1

      - name: 📋 Publicar URL en Job Summary
        if: success()
        env:
          ALB_DNS: ${{ steps.get-alb.outputs.alb_dns }}
        run: |
          echo "## ✅ Deploy en Amazon ECS Exitoso" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Servicio Serverless:** AWS Fargate (Alta Disponibilidad)" >> $GITHUB_STEP_SUMMARY
          echo "**URL Frontend (Balanceador):** http://$ALB_DNS" >> $GITHUB_STEP_SUMMARY
          echo "**URL Gateway:** ${{ secrets.VITE_API_URL }}" >> $GITHUB_STEP_SUMMARY
