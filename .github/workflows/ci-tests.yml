# ══════════════════════════════════════════════════════════════════
# CI Pipeline — Tests y Cobertura
# Colegio Bernardo O'Higgins — Sistema de Gestión Escolar
#
# Propósito: Ejecutar tests unitarios e integración en CADA commit
#            (separado del pipeline de deploy = mejor feedback loop)
#
# Trigger: push/PR a main o deploy
# Flujo:   Checkout → JDK → Tests paralelos → Reporte JaCoCo
# ══════════════════════════════════════════════════════════════════
name: CI — Tests & Cobertura

on:
  push:
    branches:
      - main
      - deploy
    paths:
      - "ms-**/**"
      - "api-gateway/**"
      - "eureka-server/**"
      - "pom.xml"
  pull_request:
    branches:
      - main
      - deploy

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB: Tests unitarios por microservicio (paralelo)
  # Cada MS se testea de forma independiente con su propio runner
  # ─────────────────────────────────────────────────────────────
  test:
    name: 🧪 Tests — ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false    # Si un MS falla los tests, los demás continúan
      matrix:
        include:
          - service: ms-autenticacion
            dir: ms-autenticacion
          - service: ms-calificaciones
            dir: ms-calificaciones
          - service: ms-asistencia
            dir: ms-asistencia
          - service: ms-notificaciones
            dir: ms-notificaciones
          - service: ms-horarios
            dir: ms-horarios
          - service: ms-reportes
            dir: ms-reportes

    steps:
      - name: 📥 Checkout código fuente
        uses: actions/checkout@v4

      - name: ☕ Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # Caché Maven entre runs — reduce tiempo de descarga de dependencias
          cache: maven

      - name: 🧪 Ejecutar tests con cobertura JaCoCo
        working-directory: ${{ matrix.dir }}
        run: |
          mvn test jacoco:report \
            -Dspring.profiles.active=test \
            --no-transfer-progress \
            -B

      - name: 📊 Publicar reporte de cobertura JaCoCo
        uses: actions/upload-artifact@v4
        if: always()    # Subir aunque los tests fallen (para debug)
        with:
          name: jacoco-report-${{ matrix.service }}
          path: ${{ matrix.dir }}/target/site/jacoco/
          retention-days: 7

      - name: 📋 Resumen de cobertura en el Job Summary
        if: always()
        working-directory: ${{ matrix.dir }}
        run: |
          echo "## 📊 Cobertura JaCoCo — ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          # Extraer métricas del reporte XML si existe
          if [ -f "target/site/jacoco/jacoco.xml" ]; then
            COVERED=$(grep -oP 'covered="\K[0-9]+' target/site/jacoco/jacoco.xml | paste -sd+ | bc 2>/dev/null || echo "N/A")
            MISSED=$(grep -oP 'missed="\K[0-9]+' target/site/jacoco/jacoco.xml | paste -sd+ | bc 2>/dev/null || echo "N/A")
            echo "| Métrica | Valor |" >> $GITHUB_STEP_SUMMARY
            echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Instrucciones cubiertas | $COVERED |" >> $GITHUB_STEP_SUMMARY
            echo "| Instrucciones sin cubrir | $MISSED |" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No se encontró reporte jacoco.xml" >> $GITHUB_STEP_SUMMARY
          fi

  # ─────────────────────────────────────────────────────────────
  # JOB: Resumen consolidado de todos los tests
  # Se ejecuta al final, resume el estado de todos los servicios
  # ─────────────────────────────────────────────────────────────
  summary:
    name: 📋 Resumen CI
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: 📋 Publicar resumen del pipeline CI
        run: |
          echo "## 🧪 Resultados CI — $(date '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Autor:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Estado de Tests por Microservicio" >> $GITHUB_STEP_SUMMARY
          echo "| Servicio | Estado |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          NEEDS='${{ toJSON(needs) }}'
          echo "$NEEDS" | python3 -c "
          import json, sys
          needs = json.load(sys.stdin)
          services = ['ms-autenticacion','ms-calificaciones','ms-asistencia','ms-notificaciones','ms-horarios','ms-reportes']
          for s in services:
              # result está en el job de matrix, no disponible directamente aquí
              print(f'| {s} | Ver job individual |')
          " >> $GITHUB_STEP_SUMMARY || true
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Ver cada job de test para el detalle de cobertura JaCoCo_" >> $GITHUB_STEP_SUMMARY
