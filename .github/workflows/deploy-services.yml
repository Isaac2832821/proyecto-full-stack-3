# ══════════════════════════════════════════════════════════════════
# CI/CD Pipeline — Microservicios (TODOS los servicios)
# Colegio Bernardo O'Higgins — Sistema de Gestión Escolar
#
# Trigger: push sobre la rama 'deploy' con cambios en cualquier ms-*
# Flujo:   Build imágenes → Push Docker Hub → Deploy EC2-Services → Health Check
# ══════════════════════════════════════════════════════════════════
name: CI/CD — Services

on:
  push:
    branches:
      - deploy
    paths:
      - "ms-autenticacion/**"
      - "ms-calificaciones/**"
      - "ms-asistencia/**"
      - "ms-notificaciones/**"
      - "ms-horarios/**"
      - "ms-reportes/**"
      - "docker-compose.ec2-services.yml"
      - ".github/workflows/deploy-services.yml"

env:
  DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Build y Push de imágenes — todos los microservicios
  # Cada servicio se construye en paralelo (matrix strategy)
  # ─────────────────────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false          # Si un MS falla, los demás continúan
      matrix:
        include:
          - service: ms-autenticacion
            context: ./ms-autenticacion
            image_suffix: colegio-ms-autenticacion
          - service: ms-calificaciones
            context: ./ms-calificaciones
            image_suffix: colegio-ms-calificaciones
          - service: ms-asistencia
            context: ./ms-asistencia
            image_suffix: colegio-ms-asistencia
          - service: ms-notificaciones
            context: ./ms-notificaciones
            image_suffix: colegio-ms-notificaciones
          - service: ms-horarios
            context: ./ms-horarios
            image_suffix: colegio-ms-horarios
          - service: ms-reportes
            context: ./ms-reportes
            image_suffix: colegio-ms-reportes

    steps:
      - name: 📥 Checkout código fuente
        uses: actions/checkout@v4

      - name: 🔐 Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ Generar metadata de imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image_suffix }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: ⚡ Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔨 Build y Push — ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # Caché de capas entre runs del mismo servicio (reduce tiempo de build)
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,scope=${{ matrix.service }},mode=max

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Deploy en EC2-Services via SSM
  # Espera a que TODOS los builds terminen antes de desplegar
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy en EC2-Services
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: 🔑 Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            us-east-1

      - name: 🔍 Obtener Instance IDs de EC2
        id: get-instance
        run: |
          ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=ec2-services" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=ec2-services" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].PrivateIpAddress" \
            --output text)
          echo "instance_id=$ID" >> $GITHUB_OUTPUT
          echo "instance_ip=$IP" >> $GITHUB_OUTPUT
          echo "✅ Services instance: $ID (IP: $IP)"

      - name: 🖥️ Deploy via SSM en EC2-Services
        env:
          DH_USER:     ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN:    ${{ secrets.DOCKERHUB_TOKEN }}
          JWT:         ${{ secrets.JWT_SECRET }}
          EUREKA_IP:   ${{ secrets.EUREKA_HOST }}
          RABBITMQ_U:  ${{ secrets.RABBITMQ_USER }}
          RABBITMQ_P:  ${{ secrets.RABBITMQ_PASS }}
          REPO:        ${{ github.repository }}
          INSTANCE_ID: ${{ steps.get-instance.outputs.instance_id }}
          HOST_IP:     ${{ steps.get-instance.outputs.instance_ip }}
        run: |
          python3 << 'PYEOF'
          import json, os
          dh_user    = os.environ['DH_USER']
          dh_token   = os.environ['DH_TOKEN']
          jwt        = os.environ['JWT']
          eureka_ip  = os.environ['EUREKA_IP']
          rabbitmq_u = os.environ.get('RABBITMQ_U', 'guest')
          rabbitmq_p = os.environ.get('RABBITMQ_P', 'guest')
          repo       = os.environ['REPO']
          host_ip    = os.environ['HOST_IP']
          commands = [
            "export PATH=$PATH:/usr/libexec/docker/cli-plugins:/usr/lib/docker/cli-plugins",
            f"echo '{dh_token}' | docker login -u '{dh_user}' --password-stdin",
            f"curl -fsSL 'https://raw.githubusercontent.com/{repo}/deploy/docker-compose.ec2-services.yml' -o /home/ec2-user/docker-compose.ec2-services.yml",
            # Pull todas las imágenes nuevas antes de levantar (reduce downtime)
            f"cd /home/ec2-user && HOST_IP='{host_ip}' DOCKERHUB_USERNAME='{dh_user}' JWT_SECRET='{jwt}' EUREKA_HOST='{eureka_ip}' RABBITMQ_USER='{rabbitmq_u}' RABBITMQ_PASS='{rabbitmq_p}' docker compose -f docker-compose.ec2-services.yml pull",
            # Recrear contenedores con nuevas imágenes, sin borrar los que no cambiaron
            f"cd /home/ec2-user && HOST_IP='{host_ip}' DOCKERHUB_USERNAME='{dh_user}' JWT_SECRET='{jwt}' EUREKA_HOST='{eureka_ip}' RABBITMQ_USER='{rabbitmq_u}' RABBITMQ_PASS='{rabbitmq_p}' docker compose -f docker-compose.ec2-services.yml up -d --remove-orphans",
            # Esperar 30s para que Spring Boot levante
            "sleep 30",
            # Mostrar estado de todos los contenedores
            "cd /home/ec2-user && docker compose -f docker-compose.ec2-services.yml ps",
            # Limpiar imágenes sin usar (libera espacio en disco)
            "docker image prune -f",
          ]
          with open("/tmp/ssm-services.json", "w") as f:
              json.dump({"commands": commands}, f)
          print("✅ JSON SSM generado OK")
          PYEOF

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters file:///tmp/ssm-services.json \
            --comment "Deploy services ${{ github.sha }}" \
            --region us-east-1 \
            --query "Command.CommandId" \
            --output text)
          echo "SSM Command ID: $COMMAND_ID"
          echo "command_id=$COMMAND_ID" >> $GITHUB_ENV

          # Esperar resultado SSM (máx 8 min — Spring Boot tarda en arrancar)
          for i in $(seq 1 48); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --region us-east-1 \
              --query "StatusDetails" --output text 2>/dev/null || echo "Pending")
            echo "⏳ ($i/48): $STATUS"
            if [[ "$STATUS" == "Success" ]]; then
              echo "=== OUTPUT SSM ==="
              aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --region us-east-1 --query "StandardOutputContent" --output text
              break
            elif [[ "$STATUS" == *"Failed"* || "$STATUS" == "Cancelled" || "$STATUS" == *"TimedOut"* ]]; then
              echo "❌ Deploy falló:"
              aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --region us-east-1 --query "StandardErrorContent" --output text
              exit 1
            fi
          done

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Health Check post-deploy
  # Verifica que todos los microservicios estén respondiendo
  # ─────────────────────────────────────────────────────────────
  health-check:
    name: 🏥 Health Check — Microservicios
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: 🔑 Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            us-east-1

      - name: 🔍 Obtener IP pública de ec2-services
        id: get-ip
        run: |
          PUBLIC_IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=ec2-services" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)
          echo "public_ip=$PUBLIC_IP" >> $GITHUB_OUTPUT
          echo "EC2-Services Public IP: $PUBLIC_IP"

      - name: 🏥 Verificar Health de Microservicios
        env:
          PUBLIC_IP: ${{ steps.get-ip.outputs.public_ip }}
        run: |
          echo "🔍 Comprobando health de microservicios en $PUBLIC_IP..."
          FAILED=0

          check_health() {
            local NAME=$1
            local PORT=$2
            local ENDPOINT="${PUBLIC_IP}:${PORT}/actuator/health"
            for attempt in 1 2 3; do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "http://$ENDPOINT" || echo "000")
              if [[ "$HTTP_CODE" == "200" ]]; then
                echo "  ✅ $NAME (:$PORT) — UP"
                return 0
              fi
              echo "  ⏳ $NAME (:$PORT) — attempt $attempt/3 (HTTP $HTTP_CODE)"
              sleep 15
            done
            echo "  ❌ $NAME (:$PORT) — UNHEALTHY"
            return 1
          }

          check_health "ms-autenticacion"  "8081" || FAILED=$((FAILED+1))
          check_health "ms-calificaciones" "8082" || FAILED=$((FAILED+1))
          check_health "ms-asistencia"     "8083" || FAILED=$((FAILED+1))
          check_health "ms-notificaciones" "8084" || FAILED=$((FAILED+1))
          check_health "ms-horarios"       "8085" || FAILED=$((FAILED+1))
          check_health "ms-reportes"       "8086" || FAILED=$((FAILED+1))

          echo ""
          if [[ $FAILED -eq 0 ]]; then
            echo "✅ Todos los microservicios están saludables!"
          else
            echo "⚠️  $FAILED microservicio(s) no respondieron al health check."
            echo "   Verificar logs en la instancia EC2."
            exit 1
          fi

      - name: 🔥 Smoke Test — API Gateway
        env:
          GATEWAY_URL: ${{ secrets.VITE_API_URL }}
        run: |
          echo "🔥 Smoke test al API Gateway: $GATEWAY_URL"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            -X POST "$GATEWAY_URL/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"rut":"11111111-1","password":"Admin1234!"}' || echo "000")

          if [[ "$HTTP_CODE" == "200" || "$HTTP_CODE" == "401" ]]; then
            # 200 = login ok, 401 = gateway responde pero credenciales inválidas (ambos OK para smoke test)
            echo "✅ Smoke test OK — Gateway respondió (HTTP $HTTP_CODE)"
          else
            echo "❌ Smoke test FALLÓ — Gateway no responde (HTTP $HTTP_CODE)"
            exit 1
          fi

# Trigger services
